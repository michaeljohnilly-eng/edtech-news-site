<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdTech News Daily</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #1f2937;
    }

    header {
      background: #111827;
      color: white;
      padding: 24px 20px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    header p {
      margin: 0;
      opacity: 0.85;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .meta {
      margin-bottom: 20px;
      font-size: 14px;
      color: #4b5563;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 10px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.35;
    }

    .source {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .summary {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    a.button {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
    }

    .empty, .error {
      background: white;
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <header>
    <h1>EdTech News Daily</h1>
    <p>Latest startup, product, funding, and acquisition news in education technology.</p>
  </header>

  <main>
    <div class="meta" id="meta">Loading latest update...</div>
    <div id="news-list"></div>
  </main>

  <script>
    async function loadNews() {
      const meta = document.getElementById('meta');
      const newsList = document.getElementById('news-list');

      try {
        const response = await fetch('news.json?v=' + Date.now());
        const data = await response.json();

        meta.textContent = `Last updated: ${data.updated_at} | Articles shown: ${data.articles.length}`;

        if (!data.articles.length) {
          newsList.innerHTML = '<div class="empty">No articles found in the latest update.</div>';
          return;
        }

        newsList.innerHTML = data.articles.map(article => `
          <div class="card">
            <div class="tag">${article.category || 'News'}</div>
            <h2>${article.title}</h2>
            <div class="source">${article.source || 'Unknown source'}${article.published ? ' | ' + article.published : ''}</div>
            <div class="summary">${article.summary || 'No summary available.'}</div>
            <a class="button" href="${article.link}" target="_blank" rel="noopener noreferrer">Read article</a>
          </div>
        `).join('');
      } catch (error) {
        meta.textContent = 'Could not load the latest news.';
        newsList.innerHTML = '<div class="error">Something went wrong while loading the site data.</div>';
      }
    }

    loadNews();
  </script>
</body>
</html>
