<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdTech News Daily</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #1f2937;
    }

    header {
      background: #111827;
      color: white;
      padding: 24px 20px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    header p {
      margin: 0;
      opacity: 0.85;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .meta {
      margin-bottom: 20px;
      font-size: 14px;
      color: #4b5563;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 10px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.35;
    }

    .source {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .summary {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 14px;
    }
</html>
